name: Release QuadroApp

# Triggers when you push a version tag: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # Required to create GitHub Releases and upload assets

jobs:
  release:
    strategy:
      matrix:
        include:
          # ── Windows (Anthony + any future Windows clients) ──
          - os: windows-latest
            rid: win-x64
            mainExe: QuadroApp.exe

          # ── macOS Apple Silicon — M1/M2/M3 Macs (Veerle) ──
          - os: macos-latest
            rid: osx-arm64
            mainExe: QuadroApp

          # ── macOS Intel — older Macs (add if needed) ──
          # - os: macos-13
          #   rid: osx-x64
          #   mainExe: QuadroApp

    runs-on: ${{ matrix.os }}

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. .NET 9 ─────────────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ── 3. Extract semver from tag (strips the leading 'v') ───────────────────
      - name: Extract version
        id: ver
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # ── 4. Restore ────────────────────────────────────────────────────────────
      - name: Restore packages
        run: dotnet restore QuadroApp.csproj

      # ── 5. Publish (self-contained, multi-file so Velopack can delta-patch) ───
      - name: Publish
        run: >
          dotnet publish QuadroApp.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishTrimmed=false
          -p:PublishSingleFile=false
          -p:Version=${{ steps.ver.outputs.VERSION }}
          -o publish/

      # ── 6. Install vpk CLI ────────────────────────────────────────────────────
      - name: Install vpk
        run: dotnet tool install -g vpk

      # ── 7. Pack with Velopack ─────────────────────────────────────────────────
      #   Windows → QuadroApp-win-Setup.exe + nupkg
      #   macOS   → QuadroApp-osx.app.tar.gz + nupkg
      - name: Pack
        run: >
          vpk pack
          --packId QuadroApp
          --packVersion ${{ steps.ver.outputs.VERSION }}
          --packDir publish/
          --outputDir releases/
          --mainExe ${{ matrix.mainExe }}

      # ── 8. Upload to GitHub Releases ──────────────────────────────────────────
      #   Both platforms upload to the same release.
      #   Velopack's UpdateManager picks the right package automatically.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "QuadroApp v${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: releases/**
