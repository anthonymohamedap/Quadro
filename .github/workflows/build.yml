name: Build & Release QuadroApp

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v1.0.0

jobs:

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            zip: QuadroApp_Windows.zip
          - os: macos-latest
            rid: osx-arm64
            zip: QuadroApp_Mac_ARM.zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish
        run: dotnet publish QuadroApp.csproj -c Release -r ${{ matrix.rid }} --self-contained true

      - name: Zip output (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path bin/Release/net9.0/${{ matrix.rid }}/publish/* -DestinationPath ${{ matrix.zip }}

      - name: Zip output (Mac)
        if: matrix.os == 'macos-latest'
        run: zip -r ${{ matrix.zip }} bin/Release/net9.0/${{ matrix.rid }}/publish/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.zip }}
