name: Release QuadroApp

# Triggers when you push a version tag: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # Required to create GitHub Releases and upload assets

jobs:
  release:
    strategy:
      matrix:
        include:
          # ── Windows (Anthony + any future Windows clients) ──
          - os: windows-latest
            rid: win-x64
            mainExe: QuadroApp.exe
            channel: win

          # ── macOS Apple Silicon — M1/M2/M3 Macs (Veerle) ──
          - os: macos-latest
            rid: osx-arm64
            mainExe: QuadroApp
            channel: osx

          # ── macOS Intel — older Macs (add if needed) ──
          # - os: macos-13
          #   rid: osx-x64
          #   mainExe: QuadroApp

    runs-on: ${{ matrix.os }}

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. .NET 9 ─────────────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── 3. Extract semver from tag (strips the leading 'v') ───────────────────
      - name: Extract version
        id: ver
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # ── 4. Restore ────────────────────────────────────────────────────────────
      - name: Restore packages
        run: dotnet restore QuadroApp.csproj

      # ── 5. Publish (self-contained, multi-file so Velopack can delta-patch) ───
      - name: Publish
        run: >
          dotnet publish QuadroApp.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishTrimmed=false
          -p:PublishSingleFile=false
          -p:Version=${{ steps.ver.outputs.VERSION }}
          -o publish/

      # ── 6. Install vpk CLI ────────────────────────────────────────────────────
      - name: Install vpk
        run: dotnet tool install -g vpk

      # ── 7a. Import Apple signing certificate (macOS only) ────────────────────
      - name: Import Apple certificate
        if: matrix.rid == 'osx-arm64'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      # ── 7b. Pack with Velopack ────────────────────────────────────────────────
      #   Windows → QuadroApp-win-Setup.exe + nupkg
      #   macOS   → QuadroApp-osx.app.tar.gz + nupkg (notarized)
      - name: Pack (Windows)
        if: matrix.rid == 'win-x64'
        run: >
          vpk pack
          --packId QuadroApp
          --packVersion ${{ steps.ver.outputs.VERSION }}
          --packDir publish/
          --outputDir releases/
          --mainExe ${{ matrix.mainExe }}
          --channel ${{ matrix.channel }}

      - name: Pack (macOS, with notarization)
        if: matrix.rid == 'osx-arm64'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: >
          vpk pack
          --packId QuadroApp
          --packVersion ${{ steps.ver.outputs.VERSION }}
          --packDir publish/
          --outputDir releases/
          --mainExe ${{ matrix.mainExe }}
          --channel ${{ matrix.channel }}
          --signAppIdentity "$APPLE_SIGNING_IDENTITY"
          --notaryProfile "QuadroNotary"
        # notaryProfile is stored via: xcrun notarytool store-credentials "QuadroNotary"
        #   --apple-id $APPLE_ID --password $APPLE_ID_PASSWORD --team-id $APPLE_TEAM_ID

      # ── 8. Publish MigrationTool (macOS only — one-time SQLite→PG migration) ────
      #   Self-contained single-file binary so Veerle's Mac needs no .NET SDK.
      #   Only built on the osx-arm64 runner; Windows users run MigrateAsync on Anthony's PC.
      - name: Publish MigrationTool
        if: matrix.rid == 'osx-arm64'
        run: >
          dotnet publish Scripts/MigrationTool/MigrationTool.csproj
          -c Release
          -r osx-arm64
          --self-contained
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -o migration-tool/

      - name: Rename MigrationTool binary
        if: matrix.rid == 'osx-arm64'
        run: mv migration-tool/MigrationTool releases/MigrationTool-osx-arm64

      # ── 9. Upload to GitHub Releases ──────────────────────────────────────────
      #   Both platforms upload to the same release.
      #   Velopack's UpdateManager picks the right package automatically.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "QuadroApp v${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: releases/**
