name: Auto-tag na merge

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bereken volgende versie
        id: ver
        run: |
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
          IFS='.' read -ra P <<< "${LATEST#v}"
          NEW="v${P[0]}.${P[1]}.$((${P[2]}+1))"
          echo "NEW_TAG=$NEW" >> $GITHUB_OUTPUT
          echo "Nieuwe versie: $NEW"

      - name: Push tag
        run: |
          git tag ${{ steps.ver.outputs.NEW_TAG }}
          git push origin ${{ steps.ver.outputs.NEW_TAG }}
